<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <style>
        @import url('https://googleapis.com');
* {
    font-family: "Inter";
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    align-items: center;
    justify-content: center;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
}
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(270deg, #FFD59A, white);
}
.login-box {
    background: #ffffff;
    padding: 40px;
    border-radius: 10px;
    box-shadow: 0 15px 25px rgba(0, 0, 0, 0.2);
    width: 100%;
    max-width: 400px;
}
.login-box h1 {
    background: white;
    text-align: center;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
}
.input-box input{
    border-radius: 15px;
    padding: 10px;
    background: #ffffff;
}
.login-box p {
    text-align: center;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    background: #ffffff;
    margin: 6.5px;
}
.input-group {
    background: #ffffff;
    margin-bottom: 20px
}
.input-group label {
    display: block;
    margin-bottom: 8px;
    color: #333;
    font-size: 14px;
    background: #ffffff;
}
.input-group input {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 16px;
    outline: none;
    background: #ffffff;
}
.button-log button {
    padding: 12px;
    background: burlywood;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 16px;
    outline: none;
    margin: 24px
}
.button-log {
    padding: 12px;
    background: white;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 16px;
    outline: none;
}
.input-group button {
    width: 100%;
    padding: 12px;
    border: 1px solid #ddd;
    border-radius: 5px;
    font-size: 16px;
    outline: none;
    background: #633a01;
    color: #ffffff;
    font-weight: bold;
}
.forget-pass {
    text-align: center;
    padding: 12px;
    font-size: 16px;
}
.forget-pass p {
    text-align: right;
}
    </style>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playwrite+GB+J:ital,wght@0,100..400;1,100..400&display=swap" rel="stylesheet">

</head>
<body>
    <div class="login-box">
        <h1>Login</h1>
        <p> Acesse o nosso site.</p>
        <form>
        <div class="input-group">
            <label for="email">E-mail</label>
            <input type="email" id="email" placeholder="Digite seu e-mail!" required>
        </div>
        <div class="input-group">
            <label for="password">Senha</label>
            <input type="password" id="password" placeholder="Agora, sua nova senha!" required>
        </div>
        <div class="input-group">
            <label for="join">Entrar</label>
            <button> Clique aqui </button>
        </form>
        <div class="forget-pass"> 
            <p> Esqueceu sua senha? <br> Clique aqui </p>
        </div>
    </div>
</body>
</html>
