<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evangelic</title>
    <link rel="stylesheet" href="home.css">
    <style>
* {
    font-family: "Inter";
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    align-items: center;
    justify-content: center;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
}
.header {
    padding: 25px;
    background: burlywood;
    border-bottom: 1px solid black;
    background-color: #dcb382; 
    display: flex;             
    justify-content: space-between; 
    align-items: center;      
}
.header p {
    margin: 6px;
    text-align: left;
}
.header-img img {
    display: flex;
    float: right;
    width: 65px;              
    justify-content: space-between; 
    align-items: center;
}
.main-container {
    align-items: center;
    border-radius: 10px;
    border: none;
    margin: 15px;
    background: burlywood;
    box-shadow: 0px 5px 15px rgba(0, 0, 0, 0.15);
    margin-left: 35%;
    margin-right: 35%;
    padding: 7px;
}
.main-container h4 {
    text-align: center;

}
    </style>
</head>
<body>
    <div class="header">
        <h1> Evangelic </h1>
        <div class="header-img">
            <img src="auau.png">
        </div>
    </div>
    <div class="main-container">
        <h4> Palavra do dia </h4>
    </div>
</body>
</html>
