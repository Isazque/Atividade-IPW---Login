<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="verso1.css">
    <title>Verso</title>
</head>
<body id="corpo-verso">
   <div id="wrapper">
    <h2 id="titulo-text"> VERSO DO DIA </h2>
    <p id="subtitulo-text"> Seu verso do dia é: </p>
    <button onclick="versoAleatorio()" class="verso"> Clique aqui </button>
    <h4 id="versododia"> </h4>
    <script>
   function versoAleatorio() {

    const versiculos = [
        "Porque Deus amou o mundo de tal maneira que deu o seu Filho unigênito, para que todo aquele que nele crê não pereça, mas tenha a vida eterna.",
        "Tudo posso naquele que me fortalece.",
        "O Senhor é o meu pastor; nada me faltará.",
        "Deixo-vos a paz, a minha paz vos dou; não vo-la dou como o mundo a dá.",
        "Nós amamos porque ele nos amou primeiro.",
        "Lâmpada para os meus pés é a tua palavra, e luz para o meu caminho."
    ];

    const indiceAleatorio = Math.floor(Math.random() * versiculos.length);
    document.getElementById('versododia').innerText = versiculos[indiceAleatorio];
}
    </script>
    <button onclick="voltarHome()"class="verso"> Voltar </button>
    <script>
        function voltarHome() {

            window.location.href="home.html";

        }
    </script>
   </div>
</body>
</html>
